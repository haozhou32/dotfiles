#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap          = "no"
tab_size      = 2
max_width     = 1200
max_height    = 1800
image_delay   = 30
image_filter  = "catmull-rom"
image_quality = 80

[opener]
edit = [
	{ run = "${EDITOR:-vi} %s", desc = "$EDITOR", for = "unix", block = true },
]
play = [
	{ run = "mpv %s", desc = "Play with mpv", for = "unix", orphan = true },
]
open = [
	{ run = "open %s", desc = "Open", for = "macos" },
	{ run = "xdg-open %s1", desc = "Open", for = "linux", orphan = true },
]
reveal = [
	{ run = "open -R %s1", desc = "Reveal in Finder", for = "macos" },
	{ run = "xdg-open %d1", desc = "Reveal", for = "linux", orphan = true },
]
